<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser action showcase</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #172033;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fb;
      }
      main {
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
        gap: 28px;
        min-height: 100vh;
        padding: 36px;
      }
      nav {
        border-right: 1px solid #d9deea;
        padding-right: 28px;
      }
      h1 {
        margin: 0 0 28px;
        font-size: 28px;
      }
      .nav-button,
      .primary,
      .secondary {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 15px 18px;
        text-align: left;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
      }
      .nav-button {
        margin-bottom: 12px;
        background: #e8ecf5;
        color: #26364f;
      }
      .nav-button.active {
        background: #1e66f5;
        color: white;
      }
      section {
        max-width: 820px;
      }
      .panel {
        background: white;
        border: 1px solid #dfe4ee;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 14px 38px rgb(29 39 57 / 10%);
      }
      label {
        display: block;
        margin: 0 0 8px;
        font-weight: 700;
      }
      input {
        width: 100%;
        border: 1px solid #cbd3e1;
        border-radius: 8px;
        padding: 15px 16px;
        font-size: 18px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 14px;
        align-items: end;
      }
      .primary {
        background: #1e66f5;
        color: white;
        text-align: center;
      }
      .secondary {
        margin-top: 18px;
        background: #edf1f8;
        color: #26364f;
        text-align: center;
      }
      .status {
        margin-top: 22px;
        min-height: 58px;
        border-radius: 8px;
        background: #effaf3;
        color: #175b2c;
        padding: 18px;
        font-size: 18px;
        font-weight: 700;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .metric {
        border: 1px solid #e0e5ef;
        border-radius: 8px;
        padding: 20px;
        background: #fff;
      }
      .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 32px;
      }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <h1>DemoDesk</h1>
        <button class="nav-button active" id="projects-tab">Projects</button>
        <button class="nav-button" id="analytics-tab">Analytics</button>
        <button class="nav-button" id="settings-tab">Settings</button>
      </nav>
      <section>
        <div class="panel" id="projects-panel">
          <h2>Create a project</h2>
          <div class="row">
            <div>
              <label for="project-name">Project name</label>
              <input id="project-name" autocomplete="off" placeholder="Launch Kit" />
            </div>
            <button class="primary" id="create-project">Create</button>
          </div>
          <button class="secondary" id="sample-data">Load sample data</button>
          <div class="status" id="status">Waiting for project details.</div>
        </div>
        <div class="panel" id="analytics-panel" hidden>
          <h2>Analytics overview</h2>
          <div class="metrics">
            <div class="metric">Visitors<strong id="visitors">12.4k</strong></div>
            <div class="metric">Trials<strong id="trials">318</strong></div>
            <div class="metric">Revenue<strong id="revenue">$42k</strong></div>
          </div>
          <div class="status">The new project is already included in reporting.</div>
        </div>
      </section>
    </main>
    <script>
      const projectsTab = document.querySelector("#projects-tab");
      const analyticsTab = document.querySelector("#analytics-tab");
      const projectsPanel = document.querySelector("#projects-panel");
      const analyticsPanel = document.querySelector("#analytics-panel");
      const input = document.querySelector("#project-name");
      const status = document.querySelector("#status");
      document.querySelector("#sample-data").addEventListener("click", () => {
        input.value = "Launch Kit";
        status.textContent = "Sample project data loaded.";
      });
      document.querySelector("#create-project").addEventListener("click", () => {
        status.textContent = `${input.value || "Untitled"} created and queued for launch.`;
      });
      analyticsTab.addEventListener("click", () => {
        projectsTab.classList.remove("active");
        analyticsTab.classList.add("active");
        projectsPanel.hidden = true;
        analyticsPanel.hidden = false;
      });
      projectsTab.addEventListener("click", () => {
        analyticsTab.classList.remove("active");
        projectsTab.classList.add("active");
        analyticsPanel.hidden = true;
        projectsPanel.hidden = false;
      });
    </script>
  </body>
</html>
